name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build and Export
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
        run: |
          cd frontend
          
          # 🚀 FIX: Delete Windows-specific .npmrc that breaks Linux builds
          rm -f .npmrc
          
          npm install
          
          # Inject static export and basePath on-the-fly (keeps repo code unchanged)
          # We use sed to insert these into next.config.ts only for this build
          sed -i "s/reactStrictMode: true,/reactStrictMode: true, output: 'export', basePath: '\/DishDash-Food-App-Management-System', assetPrefix: '\/DishDash-Food-App-Management-System\/',/g" next.config.ts
          
          npx next build
          
          # 🚀 ZERO-BREAK NAVIGATION FIX:
          # GitHub Pages returns 404 on refresh with Next.js. 
          # Copying index.html to 404.html lets the frontend router handle the request correctly.
          cp out/index.html out/404.html
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
